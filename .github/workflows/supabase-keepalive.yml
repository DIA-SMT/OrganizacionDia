name: Supabase Keepalive

on:
  schedule:
    - cron: '17 */2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-keepalive
  cancel-in-progress: true

jobs:
  keepalive:
    name: Consultar Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Verificar configuracion
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_ANON_KEY"

      - name: Mantener Supabase activo
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            --retry 3 \
            --retry-all-errors \
            --connect-timeout 10 \
            --max-time 30 \
            "${SUPABASE_URL%/}/rest/v1/keep_alive?select=id&limit=1" \
            --header "apikey: $SUPABASE_ANON_KEY" \
            --header "Authorization: Bearer $SUPABASE_ANON_KEY"
